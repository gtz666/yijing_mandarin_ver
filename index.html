<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>易經 · I Ching Oracle</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+SC:wght@400;700&family=Cinzel:wght@400;600&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --gold: #c9a84c;
    --gold-dim: #7a6a4a;
    --gold-faint: rgba(201,168,76,0.08);
    --gold-border: rgba(201,168,76,0.2);
    --bg: #0d0d0f;
    --text: #e8d5a3;
    --text-dim: #c8b888;
    --text-muted: #8a7a5a;
  }

  html, body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Noto Serif SC', serif;
    min-height: 100vh;
  }

  body {
    display: flex;
    justify-content: center;
    padding: 40px 20px 60px;
  }

  .container {
    width: 100%;
    max-width: 480px;
    position: relative;
  }

  /* ambient glow top */
  .container::before {
    content: '';
    position: fixed;
    top: 0; left: 50%;
    transform: translateX(-50%);
    width: 600px; height: 300px;
    background: radial-gradient(ellipse at 50% 0%, rgba(180,140,60,0.07) 0%, transparent 70%);
    pointer-events: none;
    z-index: 0;
  }

  /* ── Header ── */
  .header {
    text-align: center;
    margin-bottom: 36px;
    position: relative;
  }

  .title-zh {
    font-family: 'Noto Serif SC', serif;
    font-size: 42px;
    font-weight: 700;
    color: var(--gold);
    letter-spacing: 0.25em;
    line-height: 1;
    margin-bottom: 6px;
    text-shadow: 0 0 40px rgba(201,168,76,0.25);
  }

  .title-en {
    font-family: 'Cinzel', serif;
    font-size: 11px;
    font-weight: 400;
    color: var(--gold-dim);
    letter-spacing: 0.35em;
    text-transform: uppercase;
    margin-bottom: 20px;
  }

  .header-rule {
    width: 100%;
    height: 1px;
    background: linear-gradient(90deg, transparent, var(--gold), transparent);
    opacity: 0.3;
  }

  /* ── Question Input ── */
  .input-wrap {
    margin-bottom: 28px;
    position: relative;
  }

  .input-label {
    font-size: 10px;
    color: var(--gold-dim);
    letter-spacing: 0.25em;
    text-transform: uppercase;
    margin-bottom: 8px;
    display: block;
  }

  .question-input {
    width: 100%;
    background: var(--gold-faint);
    border: 1px solid var(--gold-border);
    border-radius: 3px;
    padding: 12px 16px;
    color: var(--text);
    font-family: 'Noto Serif SC', serif;
    font-size: 14px;
    outline: none;
    transition: border-color 0.2s, background 0.2s;
  }

  .question-input::placeholder { color: rgba(201,168,76,0.2); }
  .question-input:focus {
    border-color: rgba(201,168,76,0.45);
    background: rgba(201,168,76,0.06);
  }

  /* ── Wheel ── */
  .wheel-section {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 24px;
    margin-bottom: 32px;
  }

  .wheel-wrap {
    position: relative;
    width: 260px;
    height: 260px;
  }

  #wheel-canvas { display: block; cursor: pointer; }

  .wheel-pointer {
    position: absolute;
    top: -14px;
    left: 50%;
    transform: translateX(-50%);
    width: 0; height: 0;
    border-left: 11px solid transparent;
    border-right: 11px solid transparent;
    border-top: 22px solid var(--gold);
    filter: drop-shadow(0 2px 8px rgba(201,168,76,0.5));
    z-index: 10;
  }

  .wheel-center {
    position: absolute;
    top: 50%; left: 50%;
    transform: translate(-50%, -50%);
    width: 48px; height: 48px;
    background: var(--bg);
    border: 2px solid var(--gold);
    border-radius: 50%;
    display: flex; align-items: center; justify-content: center;
    font-size: 22px;
    color: var(--gold);
    z-index: 10;
    cursor: pointer;
    transition: transform 0.15s, box-shadow 0.2s;
    box-shadow: 0 0 0 rgba(201,168,76,0);
  }

  .wheel-center:hover {
    transform: translate(-50%, -50%) scale(1.1);
    box-shadow: 0 0 20px rgba(201,168,76,0.3);
  }

  .cast-btn {
    background: transparent;
    border: 1px solid var(--gold);
    border-radius: 3px;
    padding: 13px 52px;
    color: var(--gold);
    font-family: 'Cinzel', serif;
    font-size: 13px;
    font-weight: 600;
    letter-spacing: 0.2em;
    cursor: pointer;
    transition: background 0.2s, box-shadow 0.2s, transform 0.12s;
    position: relative;
    overflow: hidden;
  }

  .cast-btn::before {
    content: '';
    position: absolute;
    inset: 0;
    background: linear-gradient(135deg, rgba(201,168,76,0.15), rgba(201,168,76,0.05));
    opacity: 0;
    transition: opacity 0.2s;
  }

  .cast-btn:hover::before { opacity: 1; }
  .cast-btn:hover { box-shadow: 0 0 24px rgba(201,168,76,0.2); }
  .cast-btn:active { transform: scale(0.97); }
  .cast-btn:disabled { opacity: 0.35; cursor: not-allowed; transform: none; }

  /* ── Divider ── */
  .divider {
    display: none;
    width: 100%;
    height: 1px;
    background: linear-gradient(90deg, transparent, rgba(201,168,76,0.25), transparent);
    margin: 32px 0;
  }

  /* ── Result Panel ── */
  #result-panel {
    display: none;
    opacity: 0;
    transform: translateY(20px);
    transition: opacity 0.5s ease, transform 0.5s ease;
  }

  #result-panel.visible {
    opacity: 1;
    transform: translateY(0);
  }

  .question-echo {
    font-size: 12px;
    color: var(--text-muted);
    padding: 8px 12px;
    border-left: 2px solid rgba(201,168,76,0.25);
    margin-bottom: 20px;
    letter-spacing: 0.05em;
  }

  /* Hexagram header */
  .hex-header {
    display: flex;
    align-items: center;
    gap: 20px;
    margin-bottom: 20px;
  }

  .hex-lines-col {
    display: flex;
    flex-direction: column;
    gap: 6px;
    flex-shrink: 0;
  }

  .yao-row {
    display: flex;
    align-items: center;
    gap: 4px;
  }

  .yao-yang {
    width: 56px; height: 9px;
    background: var(--gold);
    border-radius: 1px;
  }

  .yao-yin-l, .yao-yin-r {
    width: 24px; height: 9px;
    background: var(--gold);
    border-radius: 1px;
  }

  .yao-gap { width: 8px; }

  .yao-change {
    width: 7px; height: 7px;
    background: #e07840;
    border-radius: 50%;
    margin-left: 5px;
    box-shadow: 0 0 6px rgba(224,120,64,0.5);
  }

  .hex-meta { flex: 1; }

  .hex-num {
    font-family: 'Cinzel', serif;
    font-size: 10px;
    color: var(--gold-dim);
    letter-spacing: 0.2em;
    margin-bottom: 4px;
  }

  .hex-name {
    font-family: 'Noto Serif SC', serif;
    font-size: 26px;
    font-weight: 700;
    color: var(--gold);
    line-height: 1.1;
    margin-bottom: 2px;
  }

  .hex-glyph {
    font-size: 32px;
    color: rgba(201,168,76,0.3);
    line-height: 1;
  }

  /* Trigram badges */
  .trigram-row {
    display: flex;
    gap: 10px;
    flex-wrap: wrap;
    margin-bottom: 18px;
  }

  .trigram-badge {
    display: flex;
    align-items: center;
    gap: 7px;
    background: rgba(201,168,76,0.06);
    border: 1px solid rgba(201,168,76,0.18);
    border-radius: 3px;
    padding: 6px 12px;
    font-size: 12px;
    color: #a8906a;
  }

  .trigram-sym { font-size: 17px; color: var(--gold); }

  /* Fortune */
  .fortune-row {
    display: flex;
    align-items: center;
    gap: 12px;
    margin-bottom: 18px;
  }

  .fortune-label {
    font-size: 10px;
    color: var(--gold-dim);
    letter-spacing: 0.2em;
    text-transform: uppercase;
  }

  .fortune-badge {
    padding: 4px 14px;
    border-radius: 20px;
    font-size: 13px;
    font-weight: 700;
    letter-spacing: 0.1em;
  }

  .f-大吉 { background: rgba(201,168,76,0.18); color: #d4aa50; border: 1px solid rgba(201,168,76,0.35); }
  .f-吉   { background: rgba(100,180,80,0.13);  color: #80c060; border: 1px solid rgba(100,180,80,0.28); }
  .f-中吉 { background: rgba(70,150,200,0.1);   color: #60a8d0; border: 1px solid rgba(70,150,200,0.22); }
  .f-中平 { background: rgba(130,130,130,0.1);  color: #888888; border: 1px solid rgba(130,130,130,0.22); }
  .f-小凶 { background: rgba(220,110,40,0.1);   color: #c07038; border: 1px solid rgba(220,110,40,0.22); }
  .f-凶   { background: rgba(200,50,50,0.1);    color: #b84848; border: 1px solid rgba(200,50,50,0.22); }

  /* Judgment */
  .judgment {
    font-size: 13px;
    color: var(--text-muted);
    font-style: italic;
    line-height: 1.7;
    padding-left: 12px;
    border-left: 2px solid rgba(201,168,76,0.25);
    margin-bottom: 18px;
  }

  /* Section */
  .section-title {
    font-size: 9px;
    color: rgba(201,168,76,0.4);
    letter-spacing: 0.28em;
    text-transform: uppercase;
    margin-bottom: 7px;
  }

  .meaning {
    font-size: 14px;
    color: var(--text-dim);
    line-height: 1.9;
    margin-bottom: 18px;
  }

  .advice-box {
    background: rgba(201,168,76,0.05);
    border: 1px solid rgba(201,168,76,0.14);
    border-radius: 3px;
    padding: 14px 16px;
    margin-bottom: 16px;
  }

  .advice {
    font-size: 13px;
    color: var(--gold);
    line-height: 1.75;
  }

  .change-box {
    background: rgba(224,120,64,0.05);
    border: 1px solid rgba(224,120,64,0.18);
    border-radius: 3px;
    padding: 10px 14px;
    font-size: 12px;
    color: #b06030;
    line-height: 1.65;
    margin-bottom: 16px;
  }

  /* Actions */
  .action-row {
    display: flex;
    gap: 12px;
    margin-top: 24px;
  }

  .btn-ghost {
    flex: 1;
    background: transparent;
    border: 1px solid rgba(201,168,76,0.22);
    border-radius: 3px;
    padding: 10px;
    color: var(--gold-dim);
    font-family: 'Cinzel', serif;
    font-size: 11px;
    letter-spacing: 0.1em;
    cursor: pointer;
    transition: border-color 0.2s, color 0.2s;
  }

  .btn-ghost:hover { border-color: rgba(201,168,76,0.45); color: var(--gold); }

  /* Footer */
  .footer {
    text-align: center;
    margin-top: 48px;
    font-size: 10px;
    color: rgba(201,168,76,0.2);
    letter-spacing: 0.2em;
  }

  /* Scrollbar */
  ::-webkit-scrollbar { width: 4px; }
  ::-webkit-scrollbar-track { background: transparent; }
  ::-webkit-scrollbar-thumb { background: rgba(201,168,76,0.2); border-radius: 2px; }
</style>
</head>
<body>
<div class="container">

  <header class="header">
    <div class="title-zh">易 經</div>
    <div class="title-en">I Ching Oracle · Book of Changes</div>
    <div class="header-rule"></div>
  </header>

  <div class="input-wrap">
    <label class="input-label" for="q">心中所问 · Your Question</label>
    <input class="question-input" id="q" type="text"
      placeholder="将问题输入心中，或直接起卦…" maxlength="80" autocomplete="off">
  </div>

  <div class="wheel-section">
    <div class="wheel-wrap">
      <div class="wheel-pointer"></div>
      <canvas id="wheel-canvas" width="260" height="260"></canvas>
      <div class="wheel-center" id="center-btn" title="Cast">☯</div>
    </div>
    <button class="cast-btn" id="cast-btn">起 卦 · CAST</button>
  </div>

  <div class="divider" id="divider"></div>

  <div id="result-panel">
    <div class="question-echo" id="q-echo" style="display:none"></div>

    <div class="hex-header">
      <div class="hex-lines-col" id="hex-lines"></div>
      <div class="hex-meta">
        <div class="hex-num" id="hex-num"></div>
        <div class="hex-name" id="hex-name"></div>
      </div>
      <div class="hex-glyph" id="hex-glyph"></div>
    </div>

    <div class="trigram-row" id="trigram-row"></div>

    <div class="fortune-row">
      <span class="fortune-label">运势 Fortune</span>
      <span class="fortune-badge" id="fortune"></span>
    </div>

    <div class="judgment" id="judgment"></div>

    <div class="section-title">卦象解读 · Reading</div>
    <div class="meaning" id="meaning"></div>

    <div class="advice-box">
      <div class="section-title">建议 · Guidance</div>
      <div class="advice" id="advice"></div>
    </div>

    <div class="change-box" id="change-box" style="display:none"></div>

    <div class="action-row">
      <button class="btn-ghost" id="reset-btn">再卜一卦 · Cast Again</button>
    </div>
  </div>

  <footer class="footer">仅供娱乐 · For Entertainment Only</footer>

</div>

<script>
const TRIGRAMS = {
  "乾":{lines:[1,1,1],symbol:"☰",nature:"天",attr:"刚健"},
  "兑":{lines:[1,1,0],symbol:"☱",nature:"泽",attr:"喜悦"},
  "离":{lines:[1,0,1],symbol:"☲",nature:"火",attr:"附丽"},
  "震":{lines:[1,0,0],symbol:"☳",nature:"雷",attr:"动"},
  "巽":{lines:[0,1,1],symbol:"☴",nature:"风",attr:"入"},
  "坎":{lines:[0,1,0],symbol:"☵",nature:"水",attr:"险陷"},
  "艮":{lines:[0,0,1],symbol:"☶",nature:"山",attr:"止"},
  "坤":{lines:[0,0,0],symbol:"☷",nature:"地",attr:"顺"},
};

const HEX = {
  "乾乾":{n:1,name:"乾为天",u:"䷀",j:"元亨，利贞。",m:"大吉大利，万象更新。刚健自强，天道运行不息。适合开创事业，积极进取，但需谨守正道，不可骄傲自满。",a:"自强不息，持守正道，时机成熟则大展宏图。",f:"大吉"},
  "坤坤":{n:2,name:"坤为地",u:"䷁",j:"元亨，利牝马之贞。",m:"柔顺厚德，包容万物。顺势而为，不宜冒进，宜以柔克刚，积蓄力量，等待时机。",a:"厚德载物，顺势而为，以柔克刚，稳扎稳打。",f:"吉"},
  "坎震":{n:3,name:"水雷屯",u:"䷂",j:"元亨，利贞，勿用有攸往，利建侯。",m:"万物初生，艰难创业。困难重重，但生机勃勃。宜稳扎稳打，不可冒然行动，寻求贵人相助。",a:"初创艰难，广纳贤才，步步为营，前途光明。",f:"中吉"},
  "艮坎":{n:4,name:"山水蒙",u:"䷃",j:"亨。匪我求童蒙，童蒙求我。",m:"启蒙教化，虚心学习。知识尚浅，需要引导。宜虚心求教，脚踏实地，切勿自以为是。",a:"虚心学习，求贤问道，循序渐进，莫急求成。",f:"中平"},
  "坎乾":{n:5,name:"水天需",u:"䷄",j:"有孚，光亨，贞吉，利涉大川。",m:"等待时机，以诚相待。时机未到，需耐心等候，保持信心，时机一到则可大展宏图。",a:"耐心等待，蓄势待发，时机一到，一飞冲天。",f:"吉"},
  "乾坎":{n:6,name:"天水讼",u:"䷅",j:"有孚，窒惕，中吉，终凶。",m:"争讼纠纷，宜和不宜斗。凡事以和为贵，争讼虽有理也难免损伤，宜中道而止，寻求调解。",a:"和为贵，息争止讼，退一步海阔天空。",f:"小凶"},
  "坤坎":{n:7,name:"地水师",u:"䷆",j:"贞，丈人吉，无咎。",m:"统帅军旅，凝聚力量。需要组织团队，统一目标，纪律严明方能成事。",a:"凝聚人心，统一方向，纪律为先，众志成城。",f:"中吉"},
  "坎坤":{n:8,name:"水地比",u:"䷇",j:"吉，原筮，元永贞，无咎。",m:"亲比相助，合作共赢。人际关系和谐，宜广结善缘，互相扶持，共同进步。",a:"广结善缘，互相扶持，团结合作，共创佳绩。",f:"吉"},
  "巽乾":{n:9,name:"风天小畜",u:"䷈",j:"亨，密云不雨，自我西郊。",m:"小有积蓄，蓄势待发。目前积累尚不足以大展拳脚，宜继续蓄积力量，时机未到勿强行。",a:"积累蓄势，韬光养晦，厚积薄发，时机将至。",f:"中吉"},
  "乾兑":{n:10,name:"天泽履",u:"䷉",j:"履虎尾，不咥人，亨。",m:"如履薄冰，谨慎行事。处境危险，但只要行为端正、小心谨慎，便可化险为夷。",a:"谨慎行事，如履薄冰，端正品行，方可无虞。",f:"中平"},
  "坤乾":{n:11,name:"地天泰",u:"䷊",j:"小往大来，吉亨。",m:"天地交泰，万事亨通。阴阳相合，上下沟通，一切顺利。是运势极佳之卦，宜积极进取。",a:"把握良机，积极进取，上下齐心，万事俱备。",f:"大吉"},
  "乾坤":{n:12,name:"天地否",u:"䷋",j:"否之匪人，不利君子贞，大往小来。",m:"天地不交，万物不通。局势阻塞，运势不顺，宜韬光养晦，静待时机，切勿强行冒进。",a:"韬光养晦，静待时机，守正待变，否极泰来。",f:"凶"},
  "乾离":{n:13,name:"天火同人",u:"䷌",j:"同人于野，亨，利涉大川，利君子贞。",m:"志同道合，团结众人。广泛联合志同道合之人，可以成就大事，共同面对困难。",a:"广结同道，团结合作，志同道合，共谋大业。",f:"大吉"},
  "离乾":{n:14,name:"火天大有",u:"䷍",j:"元亨。",m:"光明盛大，大丰收之象。拥有丰厚的资源与能量，宜广施仁德，造福众人，切勿独占。",a:"广施恩惠，宽厚待人，盛极而谦，长保昌盛。",f:"大吉"},
  "坤艮":{n:15,name:"地山谦",u:"䷎",j:"亨，君子有终。",m:"谦逊自处，以退为进。谦虚是最大的美德，越谦逊越能获得他人尊重与支持，终成大器。",a:"谦逊待人，以退为进，虚怀若谷，厚积薄发。",f:"吉"},
  "震坤":{n:16,name:"雷地豫",u:"䷏",j:"利建侯行师。",m:"欢欣鼓舞，顺势而行。顺应天时地利，凝聚人心，宜组织行动，发挥领导力。",a:"顺势而为，激励众人，把握时机，振奋出发。",f:"吉"},
  "兑震":{n:17,name:"泽雷随",u:"䷐",j:"元亨，利贞，无咎。",m:"随顺时势，灵活应变。能够顺应形势变化，灵活调整方向，必能获得良好结果。",a:"随机应变，顺势而行，灵活处世，必有收获。",f:"吉"},
  "艮巽":{n:18,name:"山风蛊",u:"䷑",j:"元亨，利涉大川，先甲三日，后甲三日。",m:"积弊已久，需要整治。旧有问题积累已深，需要大力革新整顿，虽艰难但可转危为安。",a:"勇于改革，整顿积弊，振衰起敝，焕然一新。",f:"中平"},
  "坤兑":{n:19,name:"地泽临",u:"䷒",j:"元亨，利贞，至于八月有凶。",m:"亲临督导，积极进取。临近成功，宜积极推进，但需注意盛极而衰，不可大意。",a:"积极进取，亲力亲为，把握时机，防止大意。",f:"吉"},

function trigramName(three) {
  for (const [k,v] of Object.entries(TRIGRAMS))
    if (v.lines.every((b,i)=>b===three[i])) return k;
  return "坤";
}

function castCoins() {
  const lines=[], changes=[];
  for (let i=0;i<6;i++){
    const t=[0,0,0].reduce(s=>s+(Math.random()<.5?2:3),0);
    if(t===6){lines.push(0);changes.push(i);}
    else if(t===7)lines.push(1);
    else if(t===8)lines.push(0);
    else{lines.push(1);changes.push(i);}
  }
  return {lines,changes};
}

function getHex(lines){
  const lo=trigramName(lines.slice(0,3)), up=trigramName(lines.slice(3));
  return {up,lo,d:HEX[up+lo]||{n:0,name:"未知卦",u:"？",j:"",m:"此卦象待完善。",a:"审时度势。",f:"中平"}};
}

// ── Canvas wheel ──
const cv=document.getElementById('wheel-canvas');
const cx=cv.getContext('2d');
const W=260,R=122,CX=W/2,CY=W/2;
const SYMS=["☰","☱","☲","☳","☴","☵","☶","☷"];
const SECTOR_N=24;
let angle=0, spinning=false;

function drawWheel(a){
  cx.clearRect(0,0,W,W);
  const sa=(2*Math.PI)/SECTOR_N;
  for(let i=0;i<SECTOR_N;i++){
    const s=a+i*sa, e=s+sa;
    // sector fill
    cx.beginPath(); cx.moveTo(CX,CY); cx.arc(CX,CY,R,s,e); cx.closePath();
    const shade = i%2===0?'#181508':'#141204';
    cx.fillStyle=shade; cx.fill();
    // sector border
    cx.beginPath(); cx.moveTo(CX,CY); cx.arc(CX,CY,R,s,e); cx.closePath();
    cx.strokeStyle='rgba(201,168,76,0.3)'; cx.lineWidth=0.7; cx.stroke();
    // symbol
    const mid=s+sa/2;
    const tx=CX+R*0.66*Math.cos(mid), ty=CY+R*0.66*Math.sin(mid);
    cx.save(); cx.translate(tx,ty); cx.rotate(mid+Math.PI/2);
    cx.fillStyle='rgba(201,168,76,0.55)'; cx.font='12px serif';
    cx.textAlign='center'; cx.textBaseline='middle';
    cx.fillText(SYMS[i%8],0,0); cx.restore();
  }
  // outer ring
  cx.beginPath(); cx.arc(CX,CY,R,0,2*Math.PI);
  cx.strokeStyle='rgba(201,168,76,0.55)'; cx.lineWidth=1.5; cx.stroke();
  // inner rings
  [0.38,0.55,0.75].forEach(r=>{
    cx.beginPath(); cx.arc(CX,CY,R*r,0,2*Math.PI);
    cx.strokeStyle='rgba(201,168,76,0.08)'; cx.lineWidth=0.5; cx.stroke();
  });
}

drawWheel(0);

function doSpin(){
  if(spinning)return;
  spinning=true;
  document.getElementById('cast-btn').disabled=true;
  document.getElementById('result-panel').style.display='none';
  document.getElementById('result-panel').classList.remove('visible');
  document.getElementById('divider').style.display='none';

  const result=castCoins();
  const total=(5+Math.random()*5)*2*Math.PI;
  const dur=2600+Math.random()*900;
  const t0=performance.now(), a0=angle;
  const ease=t=>1-Math.pow(1-t,3.2);

  (function frame(now){
    const p=Math.min((now-t0)/dur,1);
    angle=a0+total*ease(p);
    drawWheel(angle);
    if(p<1){requestAnimationFrame(frame);}
    else{
      spinning=false;
      document.getElementById('cast-btn').disabled=false;
      showResult(result);
    }
  })(performance.now());
}

function showResult({lines,changes}){
  const {up,lo,d}=getHex(lines);
  document.getElementById('divider').style.display='block';
  const panel=document.getElementById('result-panel');
  panel.style.display='block';
  setTimeout(()=>panel.classList.add('visible'),10);

  const q=document.getElementById('q').value.trim();
  const qe=document.getElementById('q-echo');
  if(q){qe.style.display='block';qe.textContent='所问：'+q;}
  else qe.style.display='none';

  document.getElementById('hex-num').textContent=`第 ${d.n} 卦`;
  document.getElementById('hex-name').textContent=d.name;
  document.getElementById('hex-glyph').textContent=d.u;

  // yao lines
  const lc=document.getElementById('hex-lines'); lc.innerHTML='';
  for(let i=5;i>=0;i--){
    const row=document.createElement('div'); row.className='yao-row';
    if(lines[i]===1){
      const b=document.createElement('div'); b.className='yao-yang'; row.appendChild(b);
    } else {
      ['yao-yin-l','yao-gap','yao-yin-r'].forEach(cls=>{
        const b=document.createElement('div'); b.className=cls; row.appendChild(b);
      });
    }
    if(changes.includes(i)){
      const dot=document.createElement('div'); dot.className='yao-change'; row.appendChild(dot);
    }
    lc.appendChild(row);
  }

  const ut=TRIGRAMS[up], lt=TRIGRAMS[lo];
  document.getElementById('trigram-row').innerHTML=
    `<div class="trigram-badge"><span class="trigram-sym">${ut.symbol}</span>上卦·${up}（${ut.nature}）</div>
     <div class="trigram-badge"><span class="trigram-sym">${lt.symbol}</span>下卦·${lo}（${lt.nature}）</div>`;

  const fb=document.getElementById('fortune');
  fb.textContent=d.f; fb.className='fortune-badge f-'+d.f;

  document.getElementById('judgment').textContent=d.j;
  document.getElementById('meaning').textContent=d.m;
  document.getElementById('advice').textContent=d.a;

  const cb=document.getElementById('change-box');
  if(changes.length){
    const yn=["初","二","三","四","五","上"];
    cb.style.display='block';
    cb.textContent='✦ 变爻：'+changes.map(i=>yn[i]+'爻').join('、')+'——运势将有转变，变中求变，请结合实际细思。';
  } else cb.style.display='none';

  panel.scrollIntoView({behavior:'smooth',block:'start'});
}

document.getElementById('cast-btn').addEventListener('click',doSpin);
document.getElementById('center-btn').addEventListener('click',doSpin);
document.getElementById('reset-btn').addEventListener('click',()=>{
  document.getElementById('result-panel').classList.remove('visible');
  setTimeout(()=>{
    document.getElementById('result-panel').style.display='none';
    document.getElementById('divider').style.display='none';
    document.getElementById('q').value='';
    window.scrollTo({top:0,behavior:'smooth'});
  },400);
});
document.getElementById('q').addEventListener('keydown',e=>{
  if(e.key==='Enter') doSpin();
});
</script>
</body>
</html>
